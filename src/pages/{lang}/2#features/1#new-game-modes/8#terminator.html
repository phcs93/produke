<style>
    div.terminator {
        table {
            font-family: monospace, sans-serif;
            font-size: large;
            tr {
                td {
                    border: none;
                }
                td:first-of-type {

                }
                td:last-of-type {
                    text-align: left;
                    span {
                        color: white !important;
                    }
                }
            }
        }

    }
</style>

<style>

    #glitch-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 99999;
        opacity: 0;
        mix-blend-mode: screen;
        background:
            repeating-linear-gradient(
                0deg,
                rgba(255,255,255,0.03) 0px,
                rgba(255,255,255,0.03) 1px,
                transparent 2px,
                transparent 4px
            );
    }

    .glitch-active #glitch-overlay {
        animation:
            glitchFlash 0.15s steps(2) infinite;
    }

    .glitch-active {
        animation: screenShake 0.08s infinite;
        filter:
            contrast(1.3)
            saturate(1.4)
            brightness(1.05);
    }

    @keyframes glitchFlash {
        0% {
            opacity: 0.15;
            transform: translate(0,0);
            filter: hue-rotate(0deg);
        }
        20% {
            opacity: 0.5;
            transform: translate(-5px,2px);
        }
        40% {
            opacity: 0.2;
            transform: translate(6px,-3px);
        }
        60% {
            opacity: 0.6;
            transform: translate(-2px,5px);
            filter: hue-rotate(90deg);
        }
        80% {
            opacity: 0.3;
            transform: translate(3px,-1px);
        }
        100% {
            opacity: 0.15;
            transform: translate(0,0);
        }
    }

    @keyframes screenShake {
        0% { transform: translate(0,0); }
        20% { transform: translate(-2px,1px); }
        40% { transform: translate(2px,-1px); }
        60% { transform: translate(-3px,2px); }
        80% { transform: translate(2px,-2px); }
        100% { transform: translate(0,0); }
    }

    .scanlines-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 99999;
        pointer-events: none;        
        background: linear-gradient(
            rgba(18, 16, 16, 0) 50%, 
            rgba(0, 0, 0, 0.4) 50%
        );
        background-size: 100% 3px;
    }

    .static-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 99999;
        pointer-events: none;        
        background-image: url("{$common}/res/noise.gif");
        opacity: 0.1;
    }

</style>

<script>

    function randomGlitch() {

        document.body.classList.add("glitch-active");

        const duration = Math.random() * 300 + 100;

        setTimeout(() => {
            document.body.classList.remove("glitch-active");
        }, duration);

        const next = Math.random() * 5000 + 1500;

        setTimeout(randomGlitch, next);
    }

    randomGlitch();

</script>

<script>

    async function getIPs() {
        try {
            const ipv4 = await (await fetch("https://api.ipify.org?format=json")).json();            
            document.getElementById("ipv4").innerHTML = ipv4.ip;
            try {
                const ipv6 = await (await fetch("https://api6.ipify.org?format=json")).json();
                if (ipv6.ip.length <= "999.999.999.999".length) {
                    document.getElementById("ipv6").innerHTML = "RESENDING GREETING...";
                } else {
                    document.getElementById("ipv6").innerHTML = ipv6.ip;
                }       
            } catch (e) {
                document.getElementById("ipv6").innerHTML = "RESENDING GREETING...";
            }
        } catch (e) {
            console.error(e);
        }
    }

    getIPs();

</script>

<script>

    async function getIPLocation() {

        const data = await (await fetch("https://api.ipgeolocation.io/v3/ipgeo?apiKey=2170189d97e54d4cbc5ad6f9af4c8443")).json();
       
        const address = `${data.location.country_name} - ${data.location.state_prov} - ${data.location.city}`;
        const coordinates = `LAT ${data.location.latitude} LON ${data.location.longitude}`;

        document.getElementById("address").innerHTML = address;
        document.getElementById("coordinates").innerHTML = coordinates;

    }

    getIPLocation();

</script>
