<title lang="en">Always Drop Weapon</title>
<title lang="pt">Sempre Derrubar a Arma</title>

<span lang="en">You can make players always drop their weapons when they die by enabling the netflag <pre>Netplay Options > NetFlags > Weapon Always Drops On Kill</pre>.</span>
<span lang="pt">Você pode fazer os jogadores sempre derrubarem a arma quando morrerem habilitando a netflag <pre>Netplay Options > NetFlags > Weapon Always Drops On Kill</pre>.</span>
