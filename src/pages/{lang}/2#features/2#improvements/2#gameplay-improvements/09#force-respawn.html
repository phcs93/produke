<title lang="en">Force Respawn</title>
<title lang="pt">Forçar Renascimento</title>

<span lang="en">You can force players to respawn by enabling the netflag <pre>Netplay Options > NetFlags > Force Respawn</pre>.</span>
<span lang="pt">Você pode forçar os jogadores a renascerem habilitando a netflag <pre>Netplay Options > NetFlags > Force Respawn</pre>.</span>
